<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CARALOGA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:white;
font-family:Arial, Helvetica, sans-serif;
}

.logo{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:28px;
letter-spacing:12px;
font-weight:300;
z-index:100;
}

.card{

height:100vh;

position:relative;

overflow:hidden;

}

.card img{

width:100%;

height:100%;

object-fit:cover;

transition:.5s;

}

.overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.25);

display:flex;

justify-content:center;

align-items:center;

opacity:0;

transition:.5s;

}

.card:hover img{

transform:scale(1.05);

}

.card:hover .overlay{

opacity:1;

}

.overlay a{

color:white;

text-decoration:none;

font-size:28px;

letter-spacing:8px;

border:1px solid white;

padding:15px 45px;

transition:.4s;

}

.overlay a:hover{

background:white;

color:black;

}

</style>

</head>

<body>

<div class="logo">

CARALOGA

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1496747611176-843222e1e57f?w=1600">

<div class="overlay">

<a href="#">KHÁM PHÁ</a>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1600">

<div class="overlay">

<a href="#">KHÁM PHÁ</a>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1600">

<div class="overlay">

<a href="#">KHÁM PHÁ</a>

</div>

</div>

</body>
</html>
